- name: '@timestamp'
  level: core
  required: true
  type: date
  description: 'Date/time when the event originated.

    This is the date/time extracted from the event, typically representing when the event was generated by the source.

    If the event source has no original timestamp, this value is typically populated by the first time the event was received by the pipeline.

    Required field for all events.'
  example: '2016-05-23T08:05:34.853Z'
  default_field: true
- name: message
  level: core
  type: match_only_text
  description: 'For log events the message field contains the log message, optimized for viewing in a log viewer.

    For structured logs without an original message field, other fields can be concatenated to form a human-readable summary of the event.

    If multiple messages exist, they can be combined into one message.'
  example: Hello World
  default_field: true
- name: data_stream
  title: data_stream
  group: 2
  description: Fields describing the new indexing strategy <type>-<dataset>-<namespace>
  type: group
  default_field: true
  fields:
    - name: dataset
      level: custom
      type: constant_keyword
      description: Data stream dataset name.
      example: nginx.access
      default_field: false
    - name: namespace
      level: custom
      type: constant_keyword
      description: Data stream namespace.
      example: production
      default_field: false
    - name: type
      level: custom
      type: constant_keyword
      description: Data stream type.
      example: logs
      default_field: false
- name: group
  title: Group
  group: 2
  description: The group fields are meant to represent groups that are relevant to the event.
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.real
      level: custom
      type: object
      description: Group info prior to any setgid operations.
      default_field: false
    - name: Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the group on the system/platform.
      default_field: false
    - name: Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Name of the group.
      default_field: false
- name: host
  title: Host
  group: 2
  description: 'A host is defined as a general computing instance.

    ECS host.* fields should be populated with details about the host on which the event happened, or from which the measurement was taken. Host types include hardware, virtual machines, Docker containers, and Kubernetes nodes.'
  type: group
  default_field: true
  fields:
    - name: os.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: os.Ext.variant
      level: custom
      type: keyword
      ignore_above: 1024
      description: A string value or phrase that further aid to classify or qualify the operating system (OS).  For example the distribution for a Linux OS will be entered in this field.
      example: Ubuntu
      default_field: false
- name: process
  title: Process
  group: 2
  description: 'These fields contain information about a process.

    These fields can help you correlate metrics information with a process id/name from a log message.  The `process.pid` often stays in the metric itself and is copied to the global field for correlation.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.ancestry
      level: custom
      type: keyword
      ignore_above: 1024
      description: An array of entity_ids indicating the ancestors for this event
      default_field: false
    - name: Ext.architecture
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process architecture.  It can differ from host architecture.
      example: x86_64
      default_field: false
    - name: Ext.authentication_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process authentication ID
      default_field: false
    - name: Ext.code_signature
      level: custom
      type: nested
      description: Nested version of ECS code_signature fieldset.
      default_field: false
    - name: Ext.code_signature.exists
      level: custom
      type: boolean
      description: Boolean to capture if a signature is present.
      example: 'true'
      default_field: false
    - name: Ext.code_signature.status
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'Additional information about the certificate status.

        This is useful for logging cryptographic errors with the certificate validity or trust status. Leave unpopulated if the validity or trust of the certificate was unchecked.'
      example: ERROR_UNTRUSTED_ROOT
      default_field: false
    - name: Ext.code_signature.subject_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Subject name of the code signer
      example: Microsoft Corporation
      default_field: false
    - name: Ext.code_signature.trusted
      level: custom
      type: boolean
      description: 'Stores the trust status of the certificate chain.

        Validating the trust of the certificate chain may be complicated, and this field should only be populated by tools that actively check the status.'
      example: 'true'
      default_field: false
    - name: Ext.code_signature.valid
      level: custom
      type: boolean
      description: 'Boolean to capture if the digital signature is verified against the binary content.

        Leave unpopulated if a certificate was unchecked.'
      example: 'true'
      default_field: false
    - name: Ext.defense_evasions
      level: custom
      type: keyword
      ignore_above: 1024
      description: List of defense evasions found in this process. These defense evasions can make it harder to inspect a process and/or cause abnormal OS behavior. Examples tools that can cause defense evasions include Process Doppelganging and Process Herpaderping.
      default_field: false
    - name: Ext.device.bus_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: Bus type of the device, such as Nvme, Usb, FileBackedVirtual,... etc.
      default_field: false
    - name: Ext.device.dos_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: DOS name of the device. DOS device name is in the format of driver letters such as C:, D:,...
      default_field: false
    - name: Ext.device.nt_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'NT name of the device. NT device name is in the format such as: \Device\HarddiskVolume2'
      default_field: false
    - name: Ext.device.product_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: ProductID of the device. It is provided by the vendor of the device if any.
      default_field: false
    - name: Ext.device.serial_number
      level: custom
      type: keyword
      ignore_above: 1024
      description: Serial Number of the device. It is provided by the vendor of the device if any.
      default_field: false
    - name: Ext.device.vendor_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: VendorID of the device. It is provided by the vendor of the device.
      default_field: false
    - name: Ext.device.volume_device_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'Volume device type.

        Following are examples of the most frequently seen volume device types: Disk File System CD-ROM File System'
      default_field: false
    - name: Ext.dll.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.dll.Ext.mapped_address
      level: custom
      type: unsigned_long
      description: The base address where this module is loaded.
      default_field: false
    - name: Ext.dll.Ext.mapped_size
      level: custom
      type: unsigned_long
      description: The size of this module's memory mapping, in bytes.
      default_field: false
    - name: Ext.dll.name
      level: core
      type: keyword
      ignore_above: 1024
      description: 'Name of the library.

        This generally maps to the name of the file on disk.'
      example: kernel32.dll
      default_field: false
    - name: Ext.dll.path
      level: extended
      type: keyword
      ignore_above: 1024
      description: Full file path of the library.
      example: C:\Windows\System32\kernel32.dll
      default_field: false
    - name: Ext.effective_parent.entity_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the effective process.
      example: c2c455d9f99375d
      default_field: false
    - name: Ext.effective_parent.executable
      level: custom
      type: keyword
      ignore_above: 1024
      description: Executable name for the effective process.
      example: C:\Windows\System32\wbem\WMIC.exe
      default_field: false
    - name: Ext.effective_parent.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process name for the effective process.
      example: WMIC.exe
      default_field: false
    - name: Ext.effective_parent.pid
      level: custom
      type: long
      description: Process ID.
      example: 4242
      default_field: false
    - name: Ext.mitigation_policies
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process mitigation policies include SignaturePolicy, DynamicCodePolicy, UserShadowStackPolicy, ControlFlowGuardPolicy, etc. Examples include Microsoft only, CF Guard, User Shadow Stack enabled
      default_field: false
    - name: Ext.protection
      level: custom
      type: keyword
      ignore_above: 1024
      description: Indicates the protection level of this process.  Uses the same syntax as Process Explorer. Examples include PsProtectedSignerWinTcb, PsProtectedSignerWinTcb-Light, and PsProtectedSignerWindows-Light.
      default_field: false
    - name: Ext.relative_file_creation_time
      level: custom
      type: double
      description: Number of seconds since the process's file was created. This number may be negative if the file's timestamp is in the future.
      default_field: false
    - name: Ext.relative_file_name_modify_time
      level: custom
      type: double
      description: Number of seconds since the process's name was modified. This information can come from the NTFS MFT. This number may be negative if the file's timestamp is in the future.
      default_field: false
    - name: Ext.session
      level: custom
      type: keyword
      ignore_above: 1024
      description: Session information for the current process
      default_field: false
    - name: Ext.session_info.authentication_package
      level: custom
      type: keyword
      ignore_above: 1024
      description: Name of authentication package used to log on, such as NTLM, Kerberos, or CloudAP
      default_field: false
    - name: Ext.session_info.client_address
      level: custom
      type: keyword
      ignore_above: 1024
      description: Client's IPv4 or IPv6 address as a string, if available.
      default_field: false
    - name: Ext.session_info.id
      level: custom
      type: unsigned_long
      description: Session ID
      default_field: false
    - name: Ext.session_info.logon_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: Session logon type.  Examples include Interactive, Network, and Service.
      default_field: false
    - name: Ext.session_info.relative_logon_time
      level: custom
      type: double
      description: Process creation time, relative to logon time, in seconds.
      default_field: false
    - name: Ext.session_info.relative_password_age
      level: custom
      type: double
      description: Process creation time, relative to the last time the password was changed, in seconds.
      default_field: false
    - name: Ext.session_info.user_flags
      level: custom
      type: keyword
      ignore_above: 1024
      description: List of user flags associated with this logon session. Examples include LOGON_NTLMV2_ENABLED and LOGON_WINLOGON.
      default_field: false
    - name: Ext.token.elevation
      level: custom
      type: boolean
      description: Whether the token is elevated or not
      default_field: false
    - name: Ext.token.elevation_level
      level: custom
      type: keyword
      ignore_above: 1024
      description: What level of elevation the token has
      example: one of "default", "full", "limited"
      default_field: false
    - name: Ext.token.elevation_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: What level of elevation the token has
      example: one of "default", "full", "limited"
      default_field: false
    - name: Ext.token.integrity_level_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Human readable integrity level.
      example: one of "system", "high", "medium", "low", "untrusted"
      default_field: false
    - name: Ext.token.security_attributes
      level: custom
      type: keyword
      ignore_above: 1024
      description: Array of security attributes of the token, retrieved via the  TokenSecurityAttributes class.
      example: TSA://ProcUnique, LUA://DecHdAutoAp
      default_field: false
    - name: Ext.trusted
      level: custom
      type: boolean
      description: Whether or not the process is a trusted application
      default_field: false
    - name: Ext.trusted_descendant
      level: custom
      type: boolean
      description: Whether or not the process is a descendent of a trusted application
      default_field: false
    - name: parent.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: parent.Ext.architecture
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process architecture.  It can differ from host architecture.
      example: x86_64
      default_field: false
    - name: parent.Ext.code_signature
      level: custom
      type: nested
      description: Nested version of ECS code_signature fieldset.
      default_field: false
    - name: parent.Ext.code_signature.exists
      level: custom
      type: boolean
      description: Boolean to capture if a signature is present.
      example: 'true'
      default_field: false
    - name: parent.Ext.code_signature.status
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'Additional information about the certificate status.

        This is useful for logging cryptographic errors with the certificate validity or trust status. Leave unpopulated if the validity or trust of the certificate was unchecked.'
      example: ERROR_UNTRUSTED_ROOT
      default_field: false
    - name: parent.Ext.code_signature.subject_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Subject name of the code signer
      example: Microsoft Corporation
      default_field: false
    - name: parent.Ext.code_signature.trusted
      level: custom
      type: boolean
      description: 'Stores the trust status of the certificate chain.

        Validating the trust of the certificate chain may be complicated, and this field should only be populated by tools that actively check the status.'
      example: 'true'
      default_field: false
    - name: parent.Ext.code_signature.valid
      level: custom
      type: boolean
      description: 'Boolean to capture if the digital signature is verified against the binary content.

        Leave unpopulated if a certificate was unchecked.'
      example: 'true'
      default_field: false
    - name: parent.Ext.protection
      level: custom
      type: keyword
      ignore_above: 1024
      description: Indicates the protection level of this process.  Uses the same syntax as Process Explorer. Examples include PsProtectedSignerWinTcb, PsProtectedSignerWinTcb-Light, and PsProtectedSignerWindows-Light.
      default_field: false
    - name: parent.Ext.real
      level: custom
      type: object
      description: The field set containing process info in case of any pid spoofing. This is mainly useful for process.parent.
      default_field: false
    - name: parent.Ext.real.pid
      level: custom
      type: long
      description: For process.parent this will be the ppid of the process that actually spawned the current process.
      default_field: false
    - name: parent.Ext.user
      level: custom
      type: keyword
      ignore_above: 1024
      description: User associated with the running process.
      default_field: false
    - name: parent.thread.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: parent.thread.Ext.call_stack_contains_unbacked
      level: custom
      type: boolean
      description: Indicates whether the creating thread's stack contains frames pointing outside any known executable image.
      default_field: false
- name: user
  title: User
  group: 2
  description: 'The user fields describe information about the user that is relevant to the event.

    Fields can have one entry or multiple entries. If a user has more than one id, provide an array that includes all of them.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.real
      level: custom
      type: object
      description: User info prior to any setuid operations.
      default_field: false
    - name: Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: One or multiple unique identifiers of the user.
      default_field: false
    - name: Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Short name or login of the user.
      default_field: false
    - name: group.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: group.Ext.real
      level: custom
      type: object
      description: Group info prior to any setgid operations.
      default_field: false
    - name: group.Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the group on the system/platform.
      default_field: false
    - name: group.Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Name of the group.
      default_field: false
