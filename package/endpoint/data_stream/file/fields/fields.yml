- name: '@timestamp'
  level: core
  required: true
  type: date
  description: 'Date/time when the event originated.

    This is the date/time extracted from the event, typically representing when the event was generated by the source.

    If the event source has no original timestamp, this value is typically populated by the first time the event was received by the pipeline.

    Required field for all events.'
  example: '2016-05-23T08:05:34.853Z'
  default_field: true
- name: message
  level: core
  type: match_only_text
  description: 'For log events the message field contains the log message, optimized for viewing in a log viewer.

    For structured logs without an original message field, other fields can be concatenated to form a human-readable summary of the event.

    If multiple messages exist, they can be combined into one message.'
  example: Hello World
  default_field: true
- name: Effective_process
  title: Effective_process
  group: 2
  description: 'These fields contain information about an effective process.

    The effective process is the process that requested the a specific action, without directly performing it.

    Processes can have effective parents that differ from their regular parents. For example, on Windows, "wmic process call create notepad" will ask WmiPrvSE.exe to launch notepad.exe. WmiPrvSE will be notepad''s parent, but the wmic will be the effective parent.

    Events can have effective processes that differ from their regular processes. For example, on Windows, "reg add \\localhost\HKLM\Software\Foo /v Data /t REG_SZ /d 123"  will result in a registry event from the Remote Registry service (svchost.exe). In this case, the effective process will be reg.exe.'
  type: group
  default_field: true
  fields:
    - name: entity_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the effective process.
      example: c2c455d9f99375d
      default_field: false
    - name: executable
      level: custom
      type: keyword
      ignore_above: 1024
      description: Executable name for the effective process.
      example: C:\Windows\System32\wbem\WMIC.exe
      default_field: false
    - name: name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Process name for the effective process.
      example: WMIC.exe
      default_field: false
    - name: pid
      level: custom
      type: long
      description: Process ID.
      example: 4242
      default_field: false
- name: data_stream
  title: data_stream
  group: 2
  description: Fields describing the new indexing strategy <type>-<dataset>-<namespace>
  type: group
  default_field: true
  fields:
    - name: dataset
      level: custom
      type: constant_keyword
      description: Data stream dataset name.
      example: nginx.access
      default_field: false
    - name: namespace
      level: custom
      type: constant_keyword
      description: Data stream namespace.
      example: production
      default_field: false
    - name: type
      level: custom
      type: constant_keyword
      description: Data stream type.
      example: logs
      default_field: false
- name: event
  title: Event
  group: 2
  description: 'The event fields are used for context information about the log or metric event itself.

    A log is defined as an event containing details of something that happened. Log events must include the time at which the thing happened. Examples of log events include a process starting on a host, a network packet being sent from a source to a destination, or a network connection between a client and a server being initiated or closed. A metric is defined as an event containing one or more numerical measurements and the time at which the measurement was taken. Examples of metric events include memory pressure measured on a host and device temperature. See the `event.kind` definition in this section for additional details about metric and state events.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.correlation
      level: custom
      type: object
      description: Information about event this should be correlated with.
      default_field: false
    - name: Ext.correlation.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: ID of event that this event is correlated to, e.g. quarantine event associated with an unquarantine event
      default_field: false
- name: file
  title: File
  group: 2
  description: 'A file is defined as a set of information that has been created on, or has existed on a filesystem.

    File objects can be associated with host events, network events, and/or file events (e.g., those produced by File Integrity Monitoring [FIM] products or services). File fields provide details about the affected file associated with the event or metric.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.device.bus_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: Bus type of the device, such as Nvme, Usb, FileBackedVirtual,... etc.
      default_field: false
    - name: Ext.device.dos_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: DOS name of the device. DOS device name is in the format of driver letters such as C:, D:,...
      default_field: false
    - name: Ext.device.nt_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'NT name of the device. NT device name is in the format such as: \Device\HarddiskVolume2'
      default_field: false
    - name: Ext.device.product_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: ProductID of the device. It is provided by the vendor of the device if any.
      default_field: false
    - name: Ext.device.serial_number
      level: custom
      type: keyword
      ignore_above: 1024
      description: Serial Number of the device. It is provided by the vendor of the device if any.
      default_field: false
    - name: Ext.device.vendor_id
      level: custom
      type: keyword
      ignore_above: 1024
      description: VendorID of the device. It is provided by the vendor of the device.
      default_field: false
    - name: Ext.device.volume_device_type
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'Volume device type.

        Following are examples of the most frequently seen volume device types: Disk File System CD-ROM File System'
      default_field: false
    - name: Ext.entropy
      level: custom
      type: double
      description: Entropy calculation of file's header and footer used to check file integrity.
      default_field: false
    - name: Ext.header_bytes
      level: custom
      type: keyword
      ignore_above: 1024
      description: First 16 bytes of file used to check file integrity.
      default_field: false
    - name: Ext.header_data
      level: custom
      type: text
      description: First 16 bytes of file used to check file integrity.
      default_field: false
    - name: Ext.malware_signature
      level: custom
      type: nested
      description: Nested version of malware_signature fieldset.
      default_field: false
    - name: Ext.malware_signature.all_names
      level: custom
      type: text
      description: The concatenated names of all yara signatures
      default_field: false
    - name: Ext.malware_signature.identifier
      level: custom
      type: text
      description: Malware artifact identifier.
      default_field: false
    - name: Ext.malware_signature.primary
      level: custom
      type: nested
      description: Primary malware signature match.
      default_field: false
    - name: Ext.malware_signature.primary.matches
      level: custom
      type: nested
      description: An array of bytes representing yara signature matches
      default_field: false
    - name: Ext.malware_signature.primary.signature
      level: custom
      type: nested
      description: Primary malware signature match.
      default_field: false
    - name: Ext.malware_signature.primary.signature.hash
      level: custom
      type: nested
      description: Primary malware signature hash.
      default_field: false
    - name: Ext.malware_signature.primary.signature.hash.sha256
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary malware signature sha256.
      default_field: false
    - name: Ext.malware_signature.primary.signature.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary malware signature id.
      default_field: false
    - name: Ext.malware_signature.primary.signature.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary malware signature name.
      default_field: false
    - name: Ext.malware_signature.secondary
      level: custom
      type: nested
      description: An array of malware signature matches
      default_field: false
    - name: Ext.malware_signature.version
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary malware signature version.
      default_field: false
    - name: Ext.monotonic_id
      level: custom
      type: unsigned_long
      description: File event monotonic ID.
      default_field: false
    - name: Ext.original
      level: custom
      type: object
      description: Original file information during a modification event.
      default_field: false
    - name: Ext.original.gid
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary group ID (GID) of the file.
      example: '1001'
      default_field: false
    - name: Ext.original.group
      level: custom
      type: keyword
      ignore_above: 1024
      description: Primary group name of the file.
      example: alice
      default_field: false
    - name: Ext.original.mode
      level: custom
      type: keyword
      ignore_above: 1024
      description: Original file mode prior to a modification event
      default_field: false
    - name: Ext.original.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Original file name prior to a modification event
      default_field: false
    - name: Ext.original.owner
      level: custom
      type: keyword
      ignore_above: 1024
      description: File owner's username.
      example: alice
      default_field: false
    - name: Ext.original.path
      level: custom
      type: keyword
      ignore_above: 1024
      description: Original file path prior to a modification event
      default_field: false
    - name: Ext.original.uid
      level: custom
      type: keyword
      ignore_above: 1024
      description: The user ID (UID) or security identifier (SID) of the file owner.
      example: '1001'
      default_field: false
    - name: Ext.windows
      level: custom
      type: object
      description: Platform-specific Windows fields
      default_field: false
    - name: Ext.windows.zone_identifier
      level: custom
      type: keyword
      ignore_above: 1024
      description: Windows zone identifier for a file
      default_field: false
- name: group
  title: Group
  group: 2
  description: The group fields are meant to represent groups that are relevant to the event.
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.real
      level: custom
      type: object
      description: Group info prior to any setgid operations.
      default_field: false
    - name: Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the group on the system/platform.
      default_field: false
    - name: Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Name of the group.
      default_field: false
- name: host
  title: Host
  group: 2
  description: 'A host is defined as a general computing instance.

    ECS host.* fields should be populated with details about the host on which the event happened, or from which the measurement was taken. Host types include hardware, virtual machines, Docker containers, and Kubernetes nodes.'
  type: group
  default_field: true
  fields:
    - name: os.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: os.Ext.variant
      level: custom
      type: keyword
      ignore_above: 1024
      description: A string value or phrase that further aid to classify or qualify the operating system (OS).  For example the distribution for a Linux OS will be entered in this field.
      example: Ubuntu
      default_field: false
- name: process
  title: Process
  group: 2
  description: 'These fields contain information about a process.

    These fields can help you correlate metrics information with a process id/name from a log message.  The `process.pid` often stays in the metric itself and is copied to the global field for correlation.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.ancestry
      level: custom
      type: keyword
      ignore_above: 1024
      description: An array of entity_ids indicating the ancestors for this event
      default_field: false
    - name: Ext.code_signature
      level: custom
      type: nested
      description: Nested version of ECS code_signature fieldset.
      default_field: false
    - name: Ext.code_signature.exists
      level: custom
      type: boolean
      description: Boolean to capture if a signature is present.
      example: 'true'
      default_field: false
    - name: Ext.code_signature.status
      level: custom
      type: keyword
      ignore_above: 1024
      description: 'Additional information about the certificate status.

        This is useful for logging cryptographic errors with the certificate validity or trust status. Leave unpopulated if the validity or trust of the certificate was unchecked.'
      example: ERROR_UNTRUSTED_ROOT
      default_field: false
    - name: Ext.code_signature.subject_name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Subject name of the code signer
      example: Microsoft Corporation
      default_field: false
    - name: Ext.code_signature.trusted
      level: custom
      type: boolean
      description: 'Stores the trust status of the certificate chain.

        Validating the trust of the certificate chain may be complicated, and this field should only be populated by tools that actively check the status.'
      example: 'true'
      default_field: false
    - name: Ext.code_signature.valid
      level: custom
      type: boolean
      description: 'Boolean to capture if the digital signature is verified against the binary content.

        Leave unpopulated if a certificate was unchecked.'
      example: 'true'
      default_field: false
- name: user
  title: User
  group: 2
  description: 'The user fields describe information about the user that is relevant to the event.

    Fields can have one entry or multiple entries. If a user has more than one id, provide an array that includes all of them.'
  type: group
  default_field: true
  fields:
    - name: Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: Ext.real
      level: custom
      type: object
      description: User info prior to any setuid operations.
      default_field: false
    - name: Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: One or multiple unique identifiers of the user.
      default_field: false
    - name: Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Short name or login of the user.
      default_field: false
    - name: group.Ext
      level: custom
      type: object
      description: Object for all custom defined fields to live in.
      default_field: false
    - name: group.Ext.real
      level: custom
      type: object
      description: Group info prior to any setgid operations.
      default_field: false
    - name: group.Ext.real.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: Unique identifier for the group on the system/platform.
      default_field: false
    - name: group.Ext.real.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: Name of the group.
      default_field: false
