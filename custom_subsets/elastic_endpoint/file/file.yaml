---
name: file
fields:
  base:
    fields:
      "@timestamp": {}
      message: {}
  data_stream:
    fields: "*"
  # these fields are needed in the mapping so the maps page of the security app does not throw a bunch of errors
  host:
    fields:
      os:
        fields:
          Ext:
            fields:
              variant: {}
  group:
    fields:
      Ext:
        fields:
          real:
            fields:
              id: {}
              name: {}
  user:
    fields:
      group:
        fields:
          Ext:
            fields:
              real:
                fields:
                  id: {}
                  name: {}
      Ext:
        fields:
          real:
            fields:
              id: {}
              name: {}
  process:
    fields:
      Ext:
        fields:
          ancestry: {}
          code_signature:
            fields:
              exists: {}
              status: {}
              subject_name: {}
              trusted: {}
              valid: {}
  Effective_process:
    fields:
      pid: {}
      name: {}
      executable: {}
      entity_id: {}
  file:
    fields:
      Ext:
        fields:
          header_data: {}
          header_bytes: {}
          entropy: {}
          monotonic_id: {}
          windows:
            fields:
              zone_identifier: {}
          original:
            fields:
              name: {}
              path: {}
              mode: {}
              uid: {}
              owner: {}
              gid: {}
              group: {}
          malware_signature:
            fields:
              all_names: {}
              identifier: {}
              primary:
                fields:
                  signature:
                    fields:
                      hash:
                        fields:
                          sha256: {}
                      id: {}
                      name: {}
                  matches: {}
              secondary: {}
              version: {}
          device:
           fields:
             bus_type: {}
             dos_name: {}
             nt_name: {}
             product_id: {}
             serial_number: {}
             vendor_id: {}
             volume_device_type: {}

